<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Віртуальна примірочна</title>

    <!-- A-Frame -->
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js">
    </script>

    <!-- MindAR Face Tracking -->
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-face-aframe.prod.js">
    </script>

    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 20;
            color: #fff;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px 20px;
            border-radius: 20px;
            text-decoration: none;
            font-size: 14px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .options-panel {
            position: fixed;
            left: 50%;
            transform: translateX(-50%);
            top: 20px;
            z-index: 10;
            display: flex;
            gap: 6px;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 16px;
            border-radius: 16px;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            flex-wrap: wrap;
            justify-content: center;
            max-width: 95%;
        }
        .options-panel img {
            border: solid 3px transparent;
            width: 44px;
            height: 44px;
            object-fit: cover;
            cursor: pointer;
            border-radius: 10px;
            transition: all 0.3s;
            opacity: 0.4;
        }
        .options-panel img.selected {
            border-color: #2ed573;
            opacity: 1;
        }
        .options-panel .category-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            padding: 0 4px;
            border-right: 1px solid rgba(255, 255, 255, 0.1);
        }
        .options-panel .category-group:last-child {
            border-right: none;
        }
        .options-panel .category-label {
            color: #a8b2d1;
            font-size: 9px;
            text-align: center;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .options-panel .category-group .items {
            display: flex;
            gap: 4px;
        }
        #capture-btn {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(8px);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            width: 60px;
            height: 60px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #capture-btn .inner {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: #fff;
        }
        #status {
            position: fixed;
            bottom: 110px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 15;
            color: #fff;
            background: rgba(0, 0, 0, 0.7);
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 13px;
            backdrop-filter: blur(4px);
            text-align: center;
            max-width: 90%;
            pointer-events: none;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        #status.found {
            border-color: rgba(46, 213, 115, 0.3);
            color: #2ed573;
        }
        #status.lost {
            border-color: rgba(254, 202, 87, 0.3);
            color: #feca57;
        }
        #status.loading {
            border-color: rgba(108, 92, 231, 0.3);
            color: #a29bfe;
        }
        #preview {
            position: fixed;
            z-index: 30;
            left: 5%;
            top: 5%;
            width: 90%;
            height: 90%;
            background: rgba(0, 0, 0, 0.92);
            border-radius: 16px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        #preview-image {
            max-width: 100%;
            max-height: 75%;
            border-radius: 8px;
            object-fit: contain;
        }
        #preview-controls {
            display: flex;
            gap: 12px;
            margin-top: 16px;
            flex-wrap: wrap;
            justify-content: center;
        }
        #preview-controls button {
            padding: 10px 24px;
            border: none;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        #preview-controls button:hover {
            transform: scale(1.05);
        }
        #preview-close {
            background: #ff4757;
            color: #fff;
        }
        #preview-share {
            background: #6c5ce7;
            color: #fff;
        }
        #preview-download {
            background: #2ed573;
            color: #fff;
        }
        #switch-cam {
            position: fixed;
            top: 80px;
            right: 20px;
            z-index: 15;
            background: rgba(0, 0, 0, 0.5);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            width: 44px;
            height: 44px;
            font-size: 20px;
            cursor: pointer;
            backdrop-filter: blur(4px);
        }
        #loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0b0e1a;
            z-index: 100;
            color: #fff;
            font-size: 18px;
            flex-direction: column;
            gap: 20px;
        }
        #loading .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top: 4px solid #6c5ce7;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
        #loading .progress {
            font-size: 14px;
            color: #a8b2d1;
        }
        #loading.hidden {
            display: none;
        }
        @media (max-width: 600px) {
            .options-panel {
                top: 10px;
                padding: 6px 10px;
            }
            .options-panel img {
                width: 36px;
                height: 36px;
            }
            #capture-btn {
                width: 54px;
                height: 54px;
                bottom: 20px;
            }
            #capture-btn .inner {
                width: 38px;
                height: 38px;
            }
            #status {
                font-size: 11px;
                bottom: 90px;
                padding: 6px 14px;
            }
            #switch-cam {
                top: 70px;
                right: 10px;
                width: 38px;
                height: 38px;
                font-size: 16px;
            }
            .back-btn {
                top: 10px;
                left: 10px;
                font-size: 11px;
                padding: 6px 12px;
            }
        }
    </style>
</head>
<body>

    <div id="loading">
        <div class="spinner"></div>
        <span>⏳ Завантаження MindAR...</span>
        <span class="progress" id="loadProgress">Завантаження моделі обличчя...</span>
    </div>

    <a href="index.html" class="back-btn">← Назад</a>
    <button id="switch-cam">🔄</button>

    <div id="status" class="loading">⏳ Ініціалізація...</div>

    <div class="options-panel" id="optionsPanel">
        <div class="category-group">
            <span class="category-label">🎩 Капелюхи</span>
            <div class="items">
                <img id="hat1" src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/face-tracking/assets/hat/thumbnail.png" />
                <img id="hat2" src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/face-tracking/assets/hat2/thumbnail.png" />
            </div>
        </div>
        <div class="category-group">
            <span class="category-label">👓 Окуляри</span>
            <div class="items">
                <img id="glasses1" src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/face-tracking/assets/glasses/thumbnail.png" />
                <img id="glasses2" src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/face-tracking/assets/glasses2/thumbnail.png" />
            </div>
        </div>
        <div class="category-group">
            <span class="category-label">💎 Сережки</span>
            <div class="items">
                <img id="earring" src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/face-tracking/assets/earring/thumbnail.png" />
            </div>
        </div>
    </div>

    <div id="capture-btn"><div class="inner"></div></div>

    <div id="preview">
        <img id="preview-image" />
        <div id="preview-controls">
            <button id="preview-close">✕ Закрити</button>
            <button id="preview-download">💾 Завантажити</button>
            <button id="preview-share">📤 Поділитись</button>
        </div>
    </div>

    <!-- ============================================================ -->
    <!-- ВИПРАВЛЕНА A-FRAME СЦЕНА ЗІ ЗБІЛЬШЕНИМ ТАЙМАУТОМ           -->
    <!-- ============================================================ -->
    <a-scene
    mindar-face="
        autoStart: true;
        uiLoading: no;
        uiScanning: no;
        uiError: no;
        maxTrack: 1;
        timeout: 60;
    "
    embedded
    color-space="sRGB"
    renderer="colorManagement: true; physicallyCorrectLights: true"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false">

    <a-assets>
        <a-asset-item id="headModel" src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/face-tracking/assets/sparkar/headOccluder.glb">
        </a-asset-item>
        <a-asset-item id="glassesModel" src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/face-tracking/assets/glasses/scene.gltf">
        </a-asset-item>
        <a-asset-item id="glassesModel2" src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/face-tracking/assets/glasses2/scene.gltf">
        </a-asset-item>
        <a-asset-item id="hatModel" src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/face-tracking/assets/hat/scene.gltf">
        </a-asset-item>
        <a-asset-item id="hatModel2" src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/face-tracking/assets/hat2/scene.gltf">
        </a-asset-item>
        <a-asset-item id="earringModel" src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/face-tracking/assets/earring/scene.gltf">
        </a-asset-item>
    </a-assets>

    <a-camera active="false" position="0 0 0"></a-camera>

    <!-- Оклюдер -->
    <a-entity mindar-face-target="anchorIndex: 168">
        <a-gltf-model mindar-face-occluder
        position="0 -0.3 0.15"
        rotation="0 0 0"
        scale="0.065 0.065 0.065"
        src="#headModel">
        </a-gltf-model>
    </a-entity>

    <!-- Аксесуари -->
    <a-entity mindar-face-target="anchorIndex: 10">
        <a-gltf-model rotation="0 0 0" position="0 1.0 -0.5" scale="0.35 0.35 0.35" src="#hatModel" class="hat1-entity" visible="false"></a-gltf-model>
    </a-entity>
    <a-entity mindar-face-target="anchorIndex: 10">
        <a-gltf-model rotation="0 0 0" position="0 -0.2 -0.5" scale="0.008 0.008 0.008" src="#hatModel2" class="hat2-entity" visible="false"></a-gltf-model>
    </a-entity>
    <a-entity mindar-face-target="anchorIndex: 168">
        <a-gltf-model rotation="0 0 0" position="0 0 0" scale="0.01 0.01 0.01" src="#glassesModel" class="glasses1-entity" visible="false"></a-gltf-model>
    </a-entity>
    <a-entity mindar-face-target="anchorIndex: 168">
        <a-gltf-model rotation="0 -90 0" position="0 -0.3 0" scale="0.6 0.6 0.6" src="#glassesModel2" class="glasses2-entity" visible="false"></a-gltf-model>
    </a-entity>
    <a-entity mindar-face-target="anchorIndex: 127">
        <a-gltf-model rotation="-0.1 0 0" position="0 -0.3 -0.3" scale="0.05 0.05 0.05" src="#earringModel" class="earring-entity" visible="false"></a-gltf-model>
    </a-entity>
    <a-entity mindar-face-target="anchorIndex: 356">
        <a-gltf-model rotation="0.1 0 0" position="0 -0.3 -0.3" scale="0.05 0.05 0.05" src="#earringModel" class="earring-entity" visible="false"></a-gltf-model>
    </a-entity>

</a-scene>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        const loading = document.getElementById('loading');
        const loadProgress = document.getElementById('loadProgress');
        const statusEl = document.getElementById('status');
        const switchCam = document.getElementById('switch-cam');

        // === ВІДСТЕЖЕННЯ СТАНУ ЗАВАНТАЖЕННЯ ===
        let loadAttempts = 0;
        const maxAttempts = 30;

        function checkLoading() {
            loadAttempts++;
            const mindar = document.querySelector('a-scene').components['mindar-face'];

            if (mindar && mindar.started) {
                loading.classList.add('hidden');
                statusEl.textContent = '👤 Шукайте обличчя...';
                statusEl.className = 'lost';
                console.log('✅ MindAR успішно запущено!');
                return;
            }

            if (loadAttempts > maxAttempts) {
                loading.classList.add('hidden');
                statusEl.textContent = '⚠️ Помилка завантаження. Спробуйте перезавантажити.';
                statusEl.className = 'lost';
                statusEl.style.color = '#ff4757';
                console.log('❌ MindAR не запустився після ' + maxAttempts + ' спроб');
                return;
            }

            const dots = '.'.repeat(loadAttempts % 4);
            loadProgress.textContent = 'Завантаження моделі обличчя' + dots;
            setTimeout(checkLoading, 500);
        }

        // Починаємо перевірку через 2 секунди
        setTimeout(checkLoading, 2000);

        // === СТАТУС ВІДСТЕЖЕННЯ ===
        const scene = document.querySelector('a-scene');
        let faceFound = false;

        scene.addEventListener('mindar-face-target-found', () => {
            faceFound = true;
            statusEl.textContent = '✅ Обличчя знайдено!';
            statusEl.className = 'found';
            console.log('🎯 Обличчя знайдено');
        });

        scene.addEventListener('mindar-face-target-lost', () => {
            faceFound = false;
            statusEl.textContent = '👤 Шукайте обличчя...';
            statusEl.className = 'lost';
            console.log('👤 Обличчя втрачено');
        });

        // === КЕРУВАННЯ АКСЕСУАРАМИ ===
        const list = ["glasses1", "glasses2", "hat1", "hat2", "earring"];
        const visibles = [true, false, false, true, false];

        const setVisible = (button, entities, visible) => {
            if (visible) {
                button.classList.add("selected");
            } else {
                button.classList.remove("selected");
            }
            entities.forEach((entity) => {
                entity.setAttribute("visible", visible);
            });
        };

        function getCategory(item) {
            if (item.startsWith('hat')) return 'hat';
            if (item.startsWith('glasses')) return 'glasses';
            if (item.startsWith('earring')) return 'earring';
            return 'other';
        }

        function getCategoryItems(category) {
            if (category === 'hat') return ['hat1', 'hat2'];
            if (category === 'glasses') return ['glasses1', 'glasses2'];
            if (category === 'earring') return ['earring'];
            return [];
        }

        list.forEach((item, index) => {
            const button = document.querySelector("#" + item);
            const entities = document.querySelectorAll("." + item + "-entity");
            setVisible(button, entities, visibles[index]);

            button.addEventListener('click', (e) => {
                e.stopPropagation();
                const category = getCategory(item);
                const categoryItems = getCategoryItems(category);

                categoryItems.forEach(id => {
                    if (id !== item) {
                        const otherBtn = document.querySelector("#" + id);
                        const otherEntities = document.querySelectorAll("." + id +
                        "-entity");
                        const otherIndex = list.indexOf(id);
                        visibles[otherIndex] = false;
                        setVisible(otherBtn, otherEntities, false);
                    }
                });

                visibles[index] = !visibles[index];
                setVisible(button, entities, visibles[index]);
            });
        });

        // === ПЕРЕМИКАННЯ КАМЕРИ ===
        let camIndex = 0;
        switchCam.addEventListener('click', () => {
            const mindar = document.querySelector('a-scene').components['mindar-face'];
            if (mindar && mindar.switchCamera) {
                mindar.switchCamera();
                camIndex = 1 - camIndex;
                statusEl.textContent = camIndex === 0 ? '📷 Тильна камера' : '📷 Фронтальна камера';
                setTimeout(() => {
                    statusEl.textContent = faceFound ? '✅ Обличчя знайдено!' :
                        '👤 Шукайте обличчя...';
                    statusEl.className = faceFound ? 'found' : 'lost';
                }, 1500);
            }
        });

        // === ЗАХОПЛЕННЯ ФОТО ===
        const captureBtn = document.getElementById('capture-btn');
        const preview = document.getElementById('preview');
        const previewImage = document.getElementById('preview-image');
        const previewClose = document.getElementById('preview-close');
        const previewShare = document.getElementById('preview-share');
        const previewDownload = document.getElementById('preview-download');

        function captureFrame() {
            const canvas = document.querySelector('a-scene').renderer.domElement;
            const buffer = document.createElement('canvas');
            buffer.width = canvas.width;
            buffer.height = canvas.height;
            const ctx = buffer.getContext('2d');
            ctx.drawImage(canvas, 0, 0);

            ctx.font = 'bold 14px Arial';
            ctx.fillStyle = 'rgba(255,255,255,0.3)';
            ctx.textAlign = 'right';
            ctx.textBaseline = 'bottom';
            ctx.fillText('Virtual Try-On', buffer.width - 20, buffer.height - 20);

            return buffer.toDataURL('image/png');
        }

        captureBtn.addEventListener('click', () => {
            const data = captureFrame();
            previewImage.src = data;
            preview.style.visibility = 'visible';
        });

        previewClose.addEventListener('click', () => {
            preview.style.visibility = 'hidden';
        });

        previewDownload.addEventListener('click', () => {
            const link = document.createElement('a');
            link.download = 'virtual-tryon.png';
            link.href = previewImage.src;
            link.click();
        });

        previewShare.addEventListener('click', () => {
            const canvas = document.createElement('canvas');
            const img = previewImage;
            canvas.width = img.naturalWidth || 800;
            canvas.height = img.naturalHeight || 600;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

            canvas.toBlob((blob) => {
                const file = new File([blob], 'virtual-tryon.png', { type: 'image/png' });
                const files = [file];

                if (navigator.canShare && navigator.canShare({ files })) {
                    navigator.share({
                        files: files,
                        title: 'Віртуальна примірочна',
                        text: 'Подивіться на мій образ! 👗'
                    }).catch(() => {});
                } else {
                    const link = document.createElement('a');
                    link.download = 'virtual-tryon.png';
                    link.href = previewImage.src;
                    link.click();
                }
            });
        });

        // === КЛАВІАТУРА ===
        document.addEventListener('keydown', (e) => {
            if (e.key === 'c' || e.key === 'C') captureBtn.click();
            if (e.key === 'Escape') preview.style.visibility = 'hidden';
        });

        // === ПРИМУСОВИЙ ПЕРЕЗАПУСК ПРИ ПОМИЛЦІ ===
        // Якщо через 15 секунд все ще не працює, перезавантажуємо сторінку
        setTimeout(() => {
            const mindar = document.querySelector('a-scene').components['mindar-face'];
            if (!mindar || !mindar.started) {
                console.log('🔄 Примусовий перезапуск сторінки...');
                // Показуємо повідомлення
                statusEl.textContent = '🔄 Перезавантаження...';
                setTimeout(() => {
                    location.reload();
                }, 2000);
            }
        }, 15000);

        console.log('🚀 Віртуальна примірочна запущена');
        console.log('💡 Натисніть C для фото, ESC для закриття');
        console.log('💡 Якщо довго завантажується - оновіть сторінку');
    });
</script>

</body>
</html>
