<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Віртуальна примірочна</title>

    <!-- A-Frame -->
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js">
    </script>

    <!-- MindAR Face Tracking для A-Frame -->
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-face-aframe.prod.js">
    </script>

    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 20;
            color: #fff;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px 20px;
            border-radius: 20px;
            text-decoration: none;
            font-size: 14px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s;
        }
        .back-btn:hover {
            background: rgba(0, 0, 0, 0.7);
        }

        .options-panel {
            position: fixed;
            left: 50%;
            transform: translateX(-50%);
            top: 20px;
            z-index: 10;
            display: flex;
            gap: 10px;
            background: rgba(0, 0, 0, 0.6);
            padding: 12px 20px;
            border-radius: 20px;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            flex-wrap: wrap;
            justify-content: center;
        }

        .options-panel img {
            border: solid 3px transparent;
            width: 50px;
            height: 50px;
            object-fit: cover;
            cursor: pointer;
            border-radius: 12px;
            transition: all 0.3s;
            opacity: 0.5;
        }

        .options-panel img:hover {
            transform: scale(1.1);
            opacity: 0.8;
        }

        .options-panel img.selected {
            border-color: #2ed573;
            opacity: 1;
            box-shadow: 0 0 20px rgba(46, 213, 115, 0.3);
        }

        .options-panel .category-label {
            color: #a8b2d1;
            font-size: 11px;
            text-align: center;
            display: block;
            margin-top: 2px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .options-panel .category-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 0 6px;
            border-right: 1px solid rgba(255, 255, 255, 0.1);
        }
        .options-panel .category-group:last-child {
            border-right: none;
        }

        .options-panel .category-group .items {
            display: flex;
            gap: 8px;
        }

        /* Кнопка захоплення фото */
        #capture-btn {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(8px);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            width: 70px;
            height: 70px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #capture-btn:hover {
            transform: translateX(-50%) scale(1.1);
            background: rgba(255, 255, 255, 0.25);
        }
        #capture-btn .inner {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #fff;
            transition: all 0.3s;
        }
        #capture-btn:active .inner {
            transform: scale(0.85);
        }

        /* Попередній перегляд фото */
        #preview {
            position: fixed;
            z-index: 30;
            left: 5%;
            top: 5%;
            width: 90%;
            height: 90%;
            background: rgba(0, 0, 0, 0.9);
            border-radius: 16px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        #preview-image {
            max-width: 100%;
            max-height: 80%;
            border-radius: 8px;
            object-fit: contain;
        }
        #preview-controls {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }
        #preview-controls button {
            padding: 12px 30px;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        #preview-close {
            background: #ff4757;
            color: #fff;
        }
        #preview-close:hover {
            transform: scale(1.05);
        }
        #preview-share {
            background: #6c5ce7;
            color: #fff;
        }
        #preview-share:hover {
            transform: scale(1.05);
        }
        #preview-download {
            background: #2ed573;
            color: #fff;
        }
        #preview-download:hover {
            transform: scale(1.05);
        }

        /* Статус */
        #status {
            position: fixed;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 15;
            color: #fff;
            background: rgba(0, 0, 0, 0.6);
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 14px;
            backdrop-filter: blur(4px);
            text-align: center;
            max-width: 90%;
            pointer-events: none;
        }

        @media (max-width: 600px) {
            .options-panel {
                top: 10px;
                padding: 8px 12px;
                gap: 6px;
                border-radius: 12px;
                max-width: 95%;
            }
            .options-panel img {
                width: 36px;
                height: 36px;
            }
            .options-panel .category-label {
                font-size: 9px;
            }
            #capture-btn {
                width: 60px;
                height: 60px;
                bottom: 20px;
            }
            #capture-btn .inner {
                width: 40px;
                height: 40px;
            }
            #status {
                font-size: 12px;
                bottom: 100px;
                padding: 6px 14px;
            }
            #preview-controls button {
                padding: 10px 20px;
                font-size: 14px;
            }
            .back-btn {
                top: 10px;
                left: 10px;
                font-size: 12px;
                padding: 6px 14px;
            }
        }
    </style>
</head>
<body>

    <a href="index.html" class="back-btn">← Назад</a>

    <div id="status">👤 Шукайте обличчя...</div>

    <!-- Панель вибору аксесуарів -->
    <div class="options-panel" id="optionsPanel">
        <!-- Капелюхи -->
        <div class="category-group">
            <span class="category-label">🎩 Капелюхи</span>
            <div class="items">
                <img id="hat1" src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/face-tracking/assets/hat/thumbnail.png" title="Капелюх 1" />
                <img id="hat2" src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/face-tracking/assets/hat2/thumbnail.png" title="Капелюх 2" />
            </div>
        </div>

        <!-- Окуляри -->
        <div class="category-group">
            <span class="category-label">👓 Окуляри</span>
            <div class="items">
                <img id="glasses1" src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/face-tracking/assets/glasses/thumbnail.png" title="Окуляри 1" />
                <img id="glasses2" src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/face-tracking/assets/glasses2/thumbnail.png" title="Окуляри 2" />
            </div>
        </div>

        <!-- Сережки -->
        <div class="category-group">
            <span class="category-label">💎 Сережки</span>
            <div class="items">
                <img id="earring" src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/face-tracking/assets/earring/thumbnail.png" title="Сережки" />
            </div>
        </div>
    </div>

    <!-- Кнопка захоплення -->
    <div id="capture-btn">
        <div class="inner"></div>
    </div>

    <!-- Попередній перегляд -->
    <div id="preview">
        <img id="preview-image" />
        <div id="preview-controls">
            <button id="preview-close">✕ Закрити</button>
            <button id="preview-download">💾 Завантажити</button>
            <button id="preview-share">📤 Поділитись</button>
        </div>
    </div>

    <!-- A-Frame сцена - autoStart: true для запуску без F12 -->
    <a-scene mindar-face="autoStart: true" embedded
    color-space="sRGB"
    renderer="colorManagement: true, physicallyCorrectLights"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false">

    <!-- Активи (моделі) -->
    <a-assets>
        <a-asset-item id="headModel" src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/face-tracking/assets/sparkar/headOccluder.glb">
        </a-asset-item>
        <a-asset-item id="glassesModel" src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/face-tracking/assets/glasses/scene.gltf">
        </a-asset-item>
        <a-asset-item id="glassesModel2" src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/face-tracking/assets/glasses2/scene.gltf">
        </a-asset-item>
        <a-asset-item id="hatModel" src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/face-tracking/assets/hat/scene.gltf">
        </a-asset-item>
        <a-asset-item id="hatModel2" src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/face-tracking/assets/hat2/scene.gltf">
        </a-asset-item>
        <a-asset-item id="earringModel" src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/face-tracking/assets/earring/scene.gltf">
        </a-asset-item>
    </a-assets>

    <a-camera active="false" position="0 0 0"></a-camera>

    <!-- Оклюдер голови (для правильної оклюзії) -->
    <a-entity mindar-face-target="anchorIndex: 168">
        <a-gltf-model mindar-face-occluder
        position="0 -0.3 0.15"
        rotation="0 0 0"
        scale="0.065 0.065 0.065"
        src="#headModel">
        </a-gltf-model>
    </a-entity>

    <!-- Капелюх 1 (точка 10 - верх голови) -->
    <a-entity mindar-face-target="anchorIndex: 10">
        <a-gltf-model
        rotation="0 0 0"
        position="0 1.0 -0.5"
        scale="0.35 0.35 0.35"
        src="#hatModel"
        class="hat1-entity"
        visible="false">
        </a-gltf-model>
    </a-entity>

    <!-- Капелюх 2 (точка 10 - верх голови) -->
    <a-entity mindar-face-target="anchorIndex: 10">
        <a-gltf-model
        rotation="0 0 0"
        position="0 -0.2 -0.5"
        scale="0.008 0.008 0.008"
        src="#hatModel2"
        class="hat2-entity"
        visible="false">
        </a-gltf-model>
    </a-entity>

    <!-- Окуляри 1 (точка 168 - перенісся) -->
    <a-entity mindar-face-target="anchorIndex: 168">
        <a-gltf-model
        rotation="0 0 0"
        position="0 0 0"
        scale="0.01 0.01 0.01"
        src="#glassesModel"
        class="glasses1-entity"
        visible="false">
        </a-gltf-model>
    </a-entity>

    <!-- Окуляри 2 (точка 168 - перенісся) -->
    <a-entity mindar-face-target="anchorIndex: 168">
        <a-gltf-model
        rotation="0 -90 0"
        position="0 -0.3 0"
        scale="0.6 0.6 0.6"
        src="#glassesModel2"
        class="glasses2-entity"
        visible="false">
        </a-gltf-model>
    </a-entity>

    <!-- Сережка ліва (точка 127 - ліве вухо) -->
    <a-entity mindar-face-target="anchorIndex: 127">
        <a-gltf-model
        rotation="-0.1 0 0"
        position="0 -0.3 -0.3"
        scale="0.05 0.05 0.05"
        src="#earringModel"
        class="earring-entity"
        visible="false">
        </a-gltf-model>
    </a-entity>

    <!-- Сережка права (точка 356 - праве вухо) -->
    <a-entity mindar-face-target="anchorIndex: 356">
        <a-gltf-model
        rotation="0.1 0 0"
        position="0 -0.3 -0.3"
        scale="0.05 0.05 0.05"
        src="#earringModel"
        class="earring-entity"
        visible="false">
        </a-gltf-model>
    </a-entity>

</a-scene>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        // === УПРАВЛІННЯ ВИДИМІСТЮ АКСЕСУАРІВ ===
        const list = ["glasses1", "glasses2", "hat1", "hat2", "earring"];
        // Початкова видимість: окуляри 1 та капелюх 1 видимі
        const visibles = [true, false, false, true, false];

        const setVisible = (button, entities, visible) => {
            if (visible) {
                button.classList.add("selected");
            } else {
                button.classList.remove("selected");
            }
            entities.forEach((entity) => {
                entity.setAttribute("visible", visible);
            });
        };

        list.forEach((item, index) => {
            const button = document.querySelector("#" + item);
            const entities = document.querySelectorAll("." + item + "-entity");
            setVisible(button, entities, visibles[index]);

            button.addEventListener('click', () => {
                // Якщо це категорія з кількома елементами, вимикаємо інші в категорії
                const category = getCategory(item);

                // Вимикаємо всі елементи в цій категорії
                const categoryItems = getCategoryItems(category);
                categoryItems.forEach(id => {
                    if (id !== item) {
                        const otherBtn = document.querySelector("#" + id);
                        const otherEntities = document.querySelectorAll("." + id +
                        "-entity");
                        const otherIndex = list.indexOf(id);
                        visibles[otherIndex] = false;
                        setVisible(otherBtn, otherEntities, false);
                    }
                });

                // Перемикаємо поточний елемент
                visibles[index] = !visibles[index];
                setVisible(button, entities, visibles[index]);
            });
        });

        // Допоміжні функції для категорій
        function getCategory(item) {
            if (item.startsWith('hat')) return 'hat';
            if (item.startsWith('glasses')) return 'glasses';
            if (item.startsWith('earring')) return 'earring';
            return 'other';
        }

        function getCategoryItems(category) {
            if (category === 'hat') return ['hat1', 'hat2'];
            if (category === 'glasses') return ['glasses1', 'glasses2'];
            if (category === 'earring') return ['earring'];
            return [];
        }

        // === СТАТУС ВІДСТЕЖЕННЯ ===
        const statusEl = document.getElementById('status');

        // Відстежуємо події MindAR
        document.querySelector('a-scene').addEventListener('mindar-face-target-found', () => {
            statusEl.textContent = '✅ Обличчя знайдено!';
            statusEl.style.color = '#2ed573';
        });

        document.querySelector('a-scene').addEventListener('mindar-face-target-lost', () => {
            statusEl.textContent = '👤 Шукайте обличчя...';
            statusEl.style.color = '#feca57';
        });

        // === ЗАХОПЛЕННЯ ФОТО ===
        const captureBtn = document.getElementById('capture-btn');
        const preview = document.getElementById('preview');
        const previewImage = document.getElementById('preview-image');
        const previewClose = document.getElementById('preview-close');
        const previewShare = document.getElementById('preview-share');
        const previewDownload = document.getElementById('preview-download');

        // Функція захоплення кадру з A-Frame
        function captureFrame() {
            const scene = document.querySelector('a-scene');
            const canvas = scene.renderer.domElement;

            // Створюємо буферне полотно
            const buffer = document.createElement('canvas');
            buffer.width = canvas.width;
            buffer.height = canvas.height;
            const ctx = buffer.getContext('2d');

            // Копіюємо canvas A-Frame
            ctx.drawImage(canvas, 0, 0);

            // Додаємо водяний знак
            ctx.font = 'bold 14px Arial';
            ctx.fillStyle = 'rgba(255,255,255,0.4)';
            ctx.textAlign = 'right';
            ctx.textBaseline = 'bottom';
            ctx.fillText('Virtual Try-On © 2024', buffer.width - 20, buffer.height - 20);

            return buffer.toDataURL('image/png');
        }

        captureBtn.addEventListener('click', () => {
            const data = captureFrame();
            previewImage.src = data;
            preview.style.visibility = 'visible';
        });

        previewClose.addEventListener('click', () => {
            preview.style.visibility = 'hidden';
        });

        previewDownload.addEventListener('click', () => {
            const link = document.createElement('a');
            link.download = 'virtual-tryon.png';
            link.href = previewImage.src;
            link.click();
        });

        previewShare.addEventListener('click', () => {
            const canvas = document.createElement('canvas');
            const img = previewImage;
            canvas.width = img.naturalWidth || 800;
            canvas.height = img.naturalHeight || 600;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

            canvas.toBlob((blob) => {
                const file = new File([blob], 'virtual-tryon.png', { type: 'image/png' });
                const files = [file];

                if (navigator.canShare && navigator.canShare({ files })) {
                    navigator.share({
                        files: files,
                        title: 'Віртуальна примірочна',
                        text: 'Подивіться на мій віртуальний образ! 👗'
                    }).catch(() => {});
                } else {
                    // Fallback: завантаження
                    const link = document.createElement('a');
                    link.download = 'virtual-tryon.png';
                    link.href = previewImage.src;
                    link.click();
                }
            });
        });

        // === Клавіатурні скорочення ===
        document.addEventListener('keydown', (e) => {
            if (e.key === 'c' || e.key === 'C') {
                captureBtn.click();
            }
            if (e.key === 'Escape') {
                preview.style.visibility = 'hidden';
            }
        });

        // === ПІДКАЗКА ===
        console.log('💡 Натисніть C для захоплення фото, ESC для закриття');
    });
</script>

</body>
</html>
